<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>Android Adaptive — Monochrome (themed icon)</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { background: transparent; }
body { width:432px; height:432px; overflow:hidden; display:flex; align-items:center; justify-content:center; }

/* Monochrome icon (Android 13+, "themed icons"):
   Silhueta em branco sobre fundo transparente. O sistema operacional
   aplica a cor do tema dinamicamente. Não use gradientes nem cores.
*/
.leaf-mono {
  width: 220px; height: 220px;
  color: #FFFFFF;
}
</style>
</head>
<body>
<svg class="leaf-mono" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
  <!-- Main stem -->
  <path d="M100 180 Q 100 130, 100 60" stroke="currentColor" stroke-width="9" stroke-linecap="round" fill="none"/>
  <!-- 5 leaves -->
  <ellipse cx="73"  cy="158" rx="26" ry="12" transform="rotate(-35 73 158)"/>
  <ellipse cx="127" cy="135" rx="28" ry="13" transform="rotate(35 127 135)"/>
  <ellipse cx="71"  cy="112" rx="28" ry="13" transform="rotate(-35 71 112)"/>
  <ellipse cx="129" cy="92"  rx="24" ry="12" transform="rotate(35 129 92)"/>
  <ellipse cx="100" cy="50" rx="20" ry="30"/>
</svg>
</body>
</html>
