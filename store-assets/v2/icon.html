<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<title>PlantaCerta — Icon</title>
<link rel="stylesheet" href="_shared.css"/>
<style>
body { width:512px; height:512px; margin:0; overflow:hidden; }
.icon {
  width:512px; height:512px;
  background:
    radial-gradient(circle at 30% 25%, #5B9968 0%, transparent 55%),
    radial-gradient(circle at 70% 75%, #1A3C2A 0%, transparent 60%),
    linear-gradient(145deg, #3D7A52 0%, #2D5F3F 50%, #1A3C2A 100%);
  display:flex; align-items:center; justify-content:center;
  position:relative; overflow:hidden;
}
/* Texture */
.noise {
  position:absolute; inset:0;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(168,201,164,0.15) 0, transparent 8%),
    radial-gradient(circle at 80% 70%, rgba(168,201,164,0.1) 0, transparent 6%),
    radial-gradient(circle at 50% 50%, rgba(168,201,164,0.08) 0, transparent 10%);
}

/* Decorative concentric rings */
.ring { position:absolute; border-radius:50%; border:1.5px solid rgba(255,255,255,0.07); }
.r1 { width:460px; height:460px; }
.r2 { width:360px; height:360px; border-color:rgba(255,255,255,0.05); }
.r3 { width:260px; height:260px; border-color:rgba(255,255,255,0.04); }

/* Glow behind leaf */
.glow {
  position:absolute; width:340px; height:340px; border-radius:50%;
  background: radial-gradient(circle, rgba(216,240,204,0.55) 0%, rgba(168,201,164,0.3) 30%, transparent 70%);
  filter: blur(12px);
}

.leaf-art {
  width:340px; height:340px; position:relative; z-index:2;
  filter: drop-shadow(0 16px 36px rgba(0,0,0,0.55)) drop-shadow(0 0 20px rgba(168,201,164,0.3));
}

/* Small terracotta accent dot */
.accent {
  position:absolute; width:22px; height:22px; border-radius:50%;
  background: radial-gradient(circle at 30% 30%, #F0B894, #C97B4F);
  top:128px; right:128px; z-index:3;
  box-shadow:
    0 0 0 4px rgba(201,123,79,0.25),
    0 0 0 10px rgba(201,123,79,0.12),
    0 6px 16px rgba(0,0,0,0.35);
}
.accent::after {
  content:''; position:absolute; top:4px; left:4px; width:8px; height:8px;
  border-radius:50%; background:rgba(255,255,255,0.5);
  filter: blur(2px);
}
</style>
</head>
<body>
<div class="icon">
  <div class="noise"></div>
  <div class="ring r1"></div>
  <div class="ring r2"></div>
  <div class="ring r3"></div>
  <div class="glow"></div>
  <svg class="leaf-art" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="leafA" x1="0" x2="1" y1="0" y2="1">
        <stop offset="0%" stop-color="#F0FFE8"/>
        <stop offset="40%" stop-color="#C9F0C5"/>
        <stop offset="100%" stop-color="#7AB082"/>
      </linearGradient>
      <linearGradient id="leafB" x1="0" x2="1" y1="0" y2="1">
        <stop offset="0%" stop-color="#A8C9A4"/>
        <stop offset="60%" stop-color="#5B9968"/>
        <stop offset="100%" stop-color="#2D5F3F"/>
      </linearGradient>
      <linearGradient id="stem" x1="0" x2="0" y1="0" y2="1">
        <stop offset="0%" stop-color="#7AB082"/>
        <stop offset="100%" stop-color="#3D7A52"/>
      </linearGradient>
      <linearGradient id="leafShine" x1="0" x2="0" y1="0" y2="1">
        <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.4"/>
        <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <!-- Main stem with subtle shadow -->
    <path d="M100 180 Q 100 130, 100 60" stroke="url(#stem)" stroke-width="8" stroke-linecap="round" fill="none"/>
    <path d="M100 180 Q 100 130, 100 60" stroke="#1A3C2A" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5"/>

    <!-- 5 leaves with depth (back leaves first) -->
    <!-- Back-left leaf -->
    <g>
      <ellipse cx="73"  cy="158" rx="26" ry="12" fill="url(#leafB)" transform="rotate(-35 73 158)"/>
      <ellipse cx="73"  cy="158" rx="20" ry="6" fill="url(#leafShine)" transform="rotate(-35 73 158) translate(0 -4)"/>
    </g>
    <!-- Back-right leaf -->
    <g>
      <ellipse cx="127" cy="135" rx="28" ry="13" fill="url(#leafA)" transform="rotate(35 127 135)"/>
      <ellipse cx="127" cy="135" rx="22" ry="7" fill="url(#leafShine)" transform="rotate(35 127 135) translate(0 -4)"/>
    </g>
    <!-- Middle-left leaf -->
    <g>
      <ellipse cx="71"  cy="112" rx="28" ry="13" fill="url(#leafB)" transform="rotate(-35 71 112)"/>
      <ellipse cx="71"  cy="112" rx="22" ry="7" fill="url(#leafShine)" transform="rotate(-35 71 112) translate(0 -4)"/>
    </g>
    <!-- Middle-right leaf -->
    <g>
      <ellipse cx="129" cy="92"  rx="24" ry="12" fill="url(#leafA)" transform="rotate(35 129 92)"/>
      <ellipse cx="129" cy="92"  rx="20" ry="6" fill="url(#leafShine)" transform="rotate(35 129 92) translate(0 -4)"/>
    </g>
    <!-- Top center leaf -->
    <g>
      <ellipse cx="100" cy="50" rx="20" ry="30" fill="url(#leafA)"/>
      <path d="M100 25 L 100 78" stroke="#3D7A52" stroke-width="1.8" stroke-linecap="round" opacity="0.45"/>
      <ellipse cx="93" cy="40" rx="6" ry="12" fill="url(#leafShine)"/>
    </g>
  </svg>
  <div class="accent"></div>
</div>
</body>
</html>
