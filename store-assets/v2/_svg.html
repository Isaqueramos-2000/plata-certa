<!-- Plant illustrations and icons SVG library — inline via <use> -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <defs>
    <!-- Monstera leaf -->
    <symbol id="monstera" viewBox="0 0 200 200">
      <defs>
        <linearGradient id="mg" x1="0" x2="1" y1="0" y2="1">
          <stop offset="0%" stop-color="#5B9968"/>
          <stop offset="60%" stop-color="#3D7A52"/>
          <stop offset="100%" stop-color="#1F4530"/>
        </linearGradient>
      </defs>
      <!-- Stem -->
      <path d="M100 200 Q98 130 96 80" stroke="#3D7A52" stroke-width="3" fill="none" stroke-linecap="round"/>
      <!-- Main leaf -->
      <path d="M100 30 C 60 30, 30 70, 35 110 C 40 145, 75 165, 100 165 C 125 165, 160 145, 165 110 C 170 70, 140 30, 100 30 Z"
            fill="url(#mg)"/>
      <!-- Slits (signature of monstera) -->
      <path d="M100 45 L100 75" stroke="#1F4530" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
      <path d="M70 80 Q 60 85, 55 95 Q 50 105, 60 110" fill="#1F4530" opacity="0.4"/>
      <path d="M130 80 Q 140 85, 145 95 Q 150 105, 140 110" fill="#1F4530" opacity="0.4"/>
      <path d="M68 130 Q 60 130, 55 138 Q 52 145, 62 148" fill="#1F4530" opacity="0.4"/>
      <path d="M132 130 Q 140 130, 145 138 Q 148 145, 138 148" fill="#1F4530" opacity="0.4"/>
      <!-- Veins -->
      <path d="M100 50 Q 80 100, 75 145" stroke="#1F4530" stroke-width="1.2" fill="none" opacity="0.5"/>
      <path d="M100 50 Q 120 100, 125 145" stroke="#1F4530" stroke-width="1.2" fill="none" opacity="0.5"/>
      <!-- Highlight -->
      <ellipse cx="85" cy="70" rx="15" ry="25" fill="#A8C9A4" opacity="0.25"/>
    </symbol>

    <!-- Succulent (rosette) -->
    <symbol id="succulent" viewBox="0 0 200 200">
      <defs>
        <radialGradient id="sg" cx="0.5" cy="0.5">
          <stop offset="0%" stop-color="#B0D9A8"/>
          <stop offset="70%" stop-color="#7AB082"/>
          <stop offset="100%" stop-color="#3D7A52"/>
        </radialGradient>
      </defs>
      <!-- Outer petals -->
      <g fill="url(#sg)">
        <ellipse cx="100" cy="50"  rx="22" ry="38" transform="rotate(0 100 100)" opacity="0.85"/>
        <ellipse cx="100" cy="50"  rx="22" ry="38" transform="rotate(45 100 100)" opacity="0.85"/>
        <ellipse cx="100" cy="50"  rx="22" ry="38" transform="rotate(90 100 100)" opacity="0.85"/>
        <ellipse cx="100" cy="50"  rx="22" ry="38" transform="rotate(135 100 100)" opacity="0.85"/>
        <ellipse cx="100" cy="50"  rx="22" ry="38" transform="rotate(180 100 100)" opacity="0.85"/>
        <ellipse cx="100" cy="50"  rx="22" ry="38" transform="rotate(225 100 100)" opacity="0.85"/>
        <ellipse cx="100" cy="50"  rx="22" ry="38" transform="rotate(270 100 100)" opacity="0.85"/>
        <ellipse cx="100" cy="50"  rx="22" ry="38" transform="rotate(315 100 100)" opacity="0.85"/>
      </g>
      <!-- Inner petals -->
      <g fill="#5B9968">
        <ellipse cx="100" cy="70" rx="15" ry="24" transform="rotate(22 100 100)"/>
        <ellipse cx="100" cy="70" rx="15" ry="24" transform="rotate(112 100 100)"/>
        <ellipse cx="100" cy="70" rx="15" ry="24" transform="rotate(202 100 100)"/>
        <ellipse cx="100" cy="70" rx="15" ry="24" transform="rotate(292 100 100)"/>
      </g>
      <!-- Center -->
      <circle cx="100" cy="100" r="14" fill="#3D7A52"/>
      <circle cx="100" cy="100" r="6"  fill="#1F4530"/>
    </symbol>

    <!-- Cactus -->
    <symbol id="cactus" viewBox="0 0 200 200">
      <defs>
        <linearGradient id="cg" x1="0" x2="1" y1="0" y2="0">
          <stop offset="0%" stop-color="#7AB082"/>
          <stop offset="50%" stop-color="#5B9968"/>
          <stop offset="100%" stop-color="#3D7A52"/>
        </linearGradient>
      </defs>
      <!-- Pot -->
      <rect x="60" y="155" width="80" height="35" rx="4" fill="#C97B4F"/>
      <rect x="56" y="150" width="88" height="10" rx="2" fill="#A86640"/>
      <!-- Main body -->
      <rect x="80" y="50" width="40" height="105" rx="20" fill="url(#cg)"/>
      <!-- Left arm -->
      <path d="M80 90 Q 55 90, 55 70 L 55 55 Q 55 45, 65 45 L 75 45 L 75 75" fill="url(#cg)"/>
      <!-- Right arm -->
      <path d="M120 100 Q 145 100, 145 80 L 145 65 Q 145 55, 135 55 L 125 55 L 125 85" fill="url(#cg)"/>
      <!-- Stripes -->
      <path d="M100 60 L 100 150" stroke="#3D7A52" stroke-width="1.5" opacity="0.4"/>
      <path d="M90 60 L 90 150" stroke="#3D7A52" stroke-width="1" opacity="0.3"/>
      <path d="M110 60 L 110 150" stroke="#3D7A52" stroke-width="1" opacity="0.3"/>
      <!-- Flower -->
      <circle cx="100" cy="45" r="9" fill="#E0A584"/>
      <circle cx="100" cy="45" r="4" fill="#C97B4F"/>
      <!-- Highlight -->
      <ellipse cx="92" cy="100" rx="4" ry="50" fill="#A8C9A4" opacity="0.3"/>
    </symbol>

    <!-- Orchid -->
    <symbol id="orchid" viewBox="0 0 200 200">
      <defs>
        <radialGradient id="og" cx="0.5" cy="0.5">
          <stop offset="0%" stop-color="#FFFFFF"/>
          <stop offset="40%" stop-color="#F8D4D7"/>
          <stop offset="100%" stop-color="#C97B8E"/>
        </radialGradient>
      </defs>
      <!-- Stem -->
      <path d="M100 200 Q 95 130, 100 80" stroke="#3D7A52" stroke-width="3" fill="none" stroke-linecap="round"/>
      <!-- Leaves at base -->
      <ellipse cx="80" cy="180" rx="25" ry="8" fill="#3D7A52" transform="rotate(-20 80 180)"/>
      <ellipse cx="120" cy="180" rx="25" ry="8" fill="#3D7A52" transform="rotate(20 120 180)"/>
      <!-- Petals -->
      <ellipse cx="100" cy="55"  rx="22" ry="35" fill="url(#og)" transform="rotate(0 100 80)"/>
      <ellipse cx="100" cy="55"  rx="22" ry="35" fill="url(#og)" transform="rotate(72 100 80)"/>
      <ellipse cx="100" cy="55"  rx="22" ry="35" fill="url(#og)" transform="rotate(144 100 80)"/>
      <ellipse cx="100" cy="55"  rx="22" ry="35" fill="url(#og)" transform="rotate(216 100 80)"/>
      <ellipse cx="100" cy="55"  rx="22" ry="35" fill="url(#og)" transform="rotate(288 100 80)"/>
      <!-- Center -->
      <circle cx="100" cy="80" r="10" fill="#C97B4F"/>
      <circle cx="100" cy="80" r="5"  fill="#8B4A22"/>
      <circle cx="98"  cy="78" r="2"  fill="#FFE89B" opacity="0.9"/>
    </symbol>

    <!-- Fern -->
    <symbol id="fern" viewBox="0 0 200 200">
      <defs>
        <linearGradient id="fg" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stop-color="#7AB082"/>
          <stop offset="100%" stop-color="#3D7A52"/>
        </linearGradient>
      </defs>
      <!-- Pot -->
      <path d="M60 175 L 70 195 L 130 195 L 140 175 Z" fill="#A86640"/>
      <ellipse cx="100" cy="175" rx="40" ry="6" fill="#C97B4F"/>
      <!-- Fronds (multiple stems) -->
      <g stroke="url(#fg)" stroke-width="2" fill="url(#fg)">
        <!-- Center frond -->
        <path d="M100 165 Q 100 100, 100 40" stroke-linecap="round" fill="none" stroke-width="3"/>
        <ellipse cx="92"  cy="60"  rx="14" ry="6" transform="rotate(-30 92 60)"/>
        <ellipse cx="108" cy="60"  rx="14" ry="6" transform="rotate(30 108 60)"/>
        <ellipse cx="88"  cy="85"  rx="18" ry="7" transform="rotate(-30 88 85)"/>
        <ellipse cx="112" cy="85"  rx="18" ry="7" transform="rotate(30 112 85)"/>
        <ellipse cx="85"  cy="115" rx="20" ry="8" transform="rotate(-30 85 115)"/>
        <ellipse cx="115" cy="115" rx="20" ry="8" transform="rotate(30 115 115)"/>
        <ellipse cx="83"  cy="145" rx="22" ry="9" transform="rotate(-30 83 145)"/>
        <ellipse cx="117" cy="145" rx="22" ry="9" transform="rotate(30 117 145)"/>
        <!-- Left frond -->
        <path d="M75 168 Q 50 130, 35 80" stroke-linecap="round" fill="none" stroke-width="2.5"/>
        <ellipse cx="55"  cy="120" rx="14" ry="6" transform="rotate(-50 55 120)" opacity="0.85"/>
        <ellipse cx="45"  cy="100" rx="14" ry="6" transform="rotate(-60 45 100)" opacity="0.85"/>
        <!-- Right frond -->
        <path d="M125 168 Q 150 130, 165 80" stroke-linecap="round" fill="none" stroke-width="2.5"/>
        <ellipse cx="145" cy="120" rx="14" ry="6" transform="rotate(50 145 120)" opacity="0.85"/>
        <ellipse cx="155" cy="100" rx="14" ry="6" transform="rotate(60 155 100)" opacity="0.85"/>
      </g>
    </symbol>

    <!-- App leaf logo (mais refinada que emoji) -->
    <symbol id="logo-leaf" viewBox="0 0 200 200">
      <defs>
        <linearGradient id="lg1" x1="0" x2="1" y1="0" y2="1">
          <stop offset="0%" stop-color="#C9F0C5"/>
          <stop offset="100%" stop-color="#7AB082"/>
        </linearGradient>
        <linearGradient id="lg2" x1="0" x2="1" y1="0" y2="1">
          <stop offset="0%" stop-color="#A8C9A4"/>
          <stop offset="100%" stop-color="#3D7A52"/>
        </linearGradient>
      </defs>
      <!-- Main stem -->
      <path d="M100 180 Q 100 130, 100 60" stroke="#3D7A52" stroke-width="6" stroke-linecap="round" fill="none"/>
      <!-- 5 leaves -->
      <ellipse cx="80"  cy="155" rx="20" ry="10" fill="url(#lg2)" transform="rotate(-30 80 155)"/>
      <ellipse cx="120" cy="135" rx="22" ry="11" fill="url(#lg1)" transform="rotate(30 120 135)"/>
      <ellipse cx="78"  cy="115" rx="22" ry="11" fill="url(#lg2)" transform="rotate(-30 78 115)"/>
      <ellipse cx="122" cy="95"  rx="20" ry="10" fill="url(#lg1)" transform="rotate(30 122 95)"/>
      <ellipse cx="100" cy="55"  rx="16" ry="22" fill="url(#lg1)"/>
    </symbol>

    <!-- SF Symbol-like icons -->
    <symbol id="i-camera" viewBox="0 0 24 24">
      <path d="M9 4h6l1 2h3a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h3l1-2z" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linejoin="round"/>
      <circle cx="12" cy="13" r="3.5" stroke="currentColor" stroke-width="1.8" fill="none"/>
    </symbol>
    <symbol id="i-leaf" viewBox="0 0 24 24">
      <path d="M4 18C 4 10, 12 4, 20 4 C 20 12, 14 20, 6 20 C 6 20, 5 19.5, 4 18 Z" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linejoin="round"/>
      <path d="M4 20 Q 8 14, 14 10" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    </symbol>
    <symbol id="i-book" viewBox="0 0 24 24">
      <path d="M4 5 Q 4 4, 5 4 L 11 4 Q 12 4.5, 12 6 L 12 19 Q 12 18, 11 18 L 5 18 Q 4 18, 4 17 Z" stroke="currentColor" stroke-width="1.6" fill="none"/>
      <path d="M20 5 Q 20 4, 19 4 L 13 4 Q 12 4.5, 12 6 L 12 19 Q 12 18, 13 18 L 19 18 Q 20 18, 20 17 Z" stroke="currentColor" stroke-width="1.6" fill="none"/>
    </symbol>
    <symbol id="i-person" viewBox="0 0 24 24">
      <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8" fill="none"/>
      <path d="M4 21 Q 4 14, 12 14 Q 20 14, 20 21" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    </symbol>
    <symbol id="i-sun" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="4.5" fill="currentColor"/>
      <g stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="12" y1="2" x2="12" y2="5"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="2" y1="12" x2="5" y2="12"/>
        <line x1="19" y1="12" x2="22" y2="12"/>
        <line x1="5" y1="5" x2="7" y2="7"/>
        <line x1="17" y1="17" x2="19" y2="19"/>
        <line x1="5" y1="19" x2="7" y2="17"/>
        <line x1="17" y1="7" x2="19" y2="5"/>
      </g>
    </symbol>
    <symbol id="i-drop" viewBox="0 0 24 24">
      <path d="M12 3 Q 6 11, 6 15 A 6 6 0 0 0 18 15 Q 18 11, 12 3 Z" fill="currentColor"/>
    </symbol>
    <symbol id="i-scissors" viewBox="0 0 24 24">
      <circle cx="6" cy="6" r="3" fill="none" stroke="currentColor" stroke-width="1.8"/>
      <circle cx="6" cy="18" r="3" fill="none" stroke="currentColor" stroke-width="1.8"/>
      <line x1="9" y1="8" x2="20" y2="19" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="9" y1="16" x2="20" y2="5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </symbol>
    <symbol id="i-plus" viewBox="0 0 24 24">
      <line x1="12" y1="5" x2="12" y2="19" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
      <line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
    </symbol>
    <symbol id="i-bell" viewBox="0 0 24 24">
      <path d="M6 8 A 6 6 0 0 1 18 8 V 14 L 20 17 H 4 L 6 14 Z" fill="currentColor"/>
      <path d="M10 17 Q 10 20, 12 20 Q 14 20, 14 17" stroke="currentColor" stroke-width="1.5" fill="none"/>
    </symbol>
    <symbol id="i-chevron" viewBox="0 0 24 24">
      <polyline points="9 6 15 12 9 18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="i-image" viewBox="0 0 24 24">
      <rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.8" fill="none"/>
      <circle cx="8" cy="10" r="1.5" fill="currentColor"/>
      <path d="M5 17 L 10 12 L 14 15 L 19 10 L 21 12 V 18 H 5 Z" fill="currentColor" opacity="0.4"/>
    </symbol>
    <symbol id="i-thermo" viewBox="0 0 24 24">
      <path d="M14 14 V 5 A 2 2 0 0 0 10 5 V 14 A 4 4 0 1 0 14 14 Z" stroke="currentColor" stroke-width="1.6" fill="none"/>
      <circle cx="12" cy="17" r="2" fill="currentColor"/>
    </symbol>
    <symbol id="i-signal" viewBox="0 0 24 12">
      <rect x="0" y="6" width="3" height="6" rx="0.5" fill="currentColor"/>
      <rect x="5" y="4" width="3" height="8" rx="0.5" fill="currentColor"/>
      <rect x="10" y="2" width="3" height="10" rx="0.5" fill="currentColor"/>
      <rect x="15" y="0" width="3" height="12" rx="0.5" fill="currentColor"/>
    </symbol>
    <symbol id="i-battery" viewBox="0 0 28 12">
      <rect x="0" y="0" width="24" height="12" rx="3" fill="none" stroke="currentColor" stroke-width="1.2"/>
      <rect x="2" y="2" width="18" height="8" rx="1.5" fill="currentColor"/>
      <rect x="25" y="4" width="2" height="4" rx="1" fill="currentColor"/>
    </symbol>
  </defs>
</svg>
