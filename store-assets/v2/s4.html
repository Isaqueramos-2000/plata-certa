<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<title>S4 — Lembretes</title>
<link rel="stylesheet" href="_shared.css"/>
<style>
body { width:1080px; height:1920px; margin:0; overflow:hidden;
  background:
    radial-gradient(ellipse at 70% 30%, rgba(168,201,164,0.10) 0%, transparent 50%),
    linear-gradient(160deg, #0F2A1E 0%, #1F4530 50%, #0F2A1E 100%);
  position:relative;
}
.bg-deco { position:absolute; opacity:0.05; }
.bg-deco.d1 { bottom:-100px; right:-60px; width:480px; height:480px; transform:rotate(35deg); }

.headline { position:absolute; top:120px; left:80px; right:80px; z-index:2; }
h1 { font-family:'Fraunces', Georgia, serif; font-weight:700;
  color:#fff; font-size:116px; line-height:0.95; letter-spacing:-3.5px; }
h1 .ital { font-style:italic; color:#E0A584; }
.sub { position:absolute; bottom:140px; left:80px; right:80px;
  color:rgba(255,255,255,0.6); font-size:42px; line-height:1.45; z-index:2; }

.phone-wrap { position:absolute; left:50%; transform:translateX(-50%); top:560px; }

.plant-screen { background: var(--cream); }
.p-hero { aspect-ratio:1.6; width:100%; background: linear-gradient(135deg, #5B9968, #1F4530); position:relative; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.p-hero svg { width:280px; height:280px; filter: drop-shadow(0 8px 20px rgba(0,0,0,0.35)); }
.p-back {
  position:absolute; top:24px; left:24px;
  background: rgba(26,31,27,0.45); border-radius:999px;
  padding:10px 18px; display:flex; align-items:center; gap:6px;
  color:#fff; font-size:16px; font-weight:600;
}
.p-back svg { width:20px; height:20px; }

.p-body { padding:22px 28px; }
.p-name { font-family:'Fraunces', serif; font-size:38px; font-weight:700; color:var(--ink); letter-spacing:-1px; }
.p-sci  { font-size:18px; color:var(--ink-soft); font-style:italic; margin-top:4px; }

/* Watering hero card */
.water-card {
  margin-top:20px; padding:22px;
  background: linear-gradient(135deg, var(--sage), var(--sage-dark));
  border-radius: 22px; color:#fff;
  position:relative; overflow:hidden;
  box-shadow: 0 10px 30px rgba(31,69,48,0.3);
}
.water-card::before {
  content:''; position:absolute; right:-30px; top:-30px;
  width:200px; height:200px; border-radius:50%; background:rgba(168,201,164,0.18);
}
.water-row { display:flex; align-items:center; gap:14px; }
.water-icon-circle {
  width:60px; height:60px; border-radius:30px;
  background: rgba(168,201,164,0.25); display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.water-icon-circle svg { width:32px; height:32px; color:#fff; }
.water-label { font-size:14px; color:rgba(255,255,255,0.7); font-weight:600; letter-spacing:1px; text-transform:uppercase; }
.water-value { font-family:'Fraunces', serif; font-size:30px; font-weight:700; margin-top:4px; }
.water-sub { font-size:15px; color:rgba(255,255,255,0.7); margin-top:2px; }

.water-progress { margin-top:18px; height:8px; background:rgba(255,255,255,0.15); border-radius:4px; overflow:hidden; }
.water-progress-fill { width:35%; height:100%; background:linear-gradient(90deg, #A8C9A4, #E0A584); border-radius:4px; }

.section-h { font-size:13px; color:var(--ink-mute); font-weight:600; letter-spacing:1.5px; margin-top:22px; }

/* Action tiles */
.actions { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:8px; margin-top:10px; }
.action-tile {
  background:#fff; border:1px solid var(--cream-dark); border-radius:14px;
  padding:14px 6px; display:flex; flex-direction:column; align-items:center; gap:6px;
  box-shadow: 0 2px 8px rgba(31,69,48,0.04);
}
.action-tile-icon {
  width:38px; height:38px; border-radius:19px;
  background: var(--cream-dark); color: var(--sage-dark);
  display:flex; align-items:center; justify-content:center;
}
.action-tile-icon svg { width:20px; height:20px; }
.action-tile-label { font-size:11px; color:var(--ink); font-weight:600; text-align:center; line-height:1.2; }

/* Notification banner */
.notif {
  margin: 18px 24px 0; padding: 16px;
  background: var(--cream-dark); border-radius: 14px;
  display:flex; align-items:center; gap:12px;
  border-left: 4px solid var(--terra);
}
.notif-icon {
  width:40px; height:40px; border-radius:20px;
  background: var(--terra-light); color: var(--terra);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.notif-icon svg { width:22px; height:22px; }
.notif-text { font-size:14px; line-height:1.4; color:var(--ink-soft); }
.notif-text b { color:var(--ink); font-weight:700; }
</style>
</head>
<body>

<svg class="bg-deco d1" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <path d="M100 30 C 60 30, 30 70, 35 110 C 40 145, 75 165, 100 165 C 125 165, 160 145, 165 110 C 170 70, 140 30, 100 30 Z" fill="#A8C9A4"/>
</svg>

<div class="headline">
  <h1>Nunca<br/>esqueça de<br/><span class="ital">regar</span></h1>
</div>

<div class="phone-wrap">
  <div class="phone">
    <div class="screen plant-screen">
      <div class="status-bar">
        <span>9:41</span>
        <span class="right">
          <svg viewBox="0 0 24 12" style="width:22px"><rect x="0" y="6" width="3" height="6" fill="currentColor"/><rect x="5" y="4" width="3" height="8" fill="currentColor"/><rect x="10" y="2" width="3" height="10" fill="currentColor"/><rect x="15" y="0" width="3" height="12" fill="currentColor"/></svg>
          <svg viewBox="0 0 28 12" style="width:26px"><rect x="0" y="0" width="24" height="12" rx="3" fill="none" stroke="currentColor" stroke-width="1.2"/><rect x="2" y="2" width="18" height="8" rx="1.5" fill="currentColor"/><rect x="25" y="4" width="2" height="4" rx="1" fill="currentColor"/></svg>
        </span>
      </div>

      <div class="p-hero">
        <div class="p-back">
          <svg viewBox="0 0 24 24"><polyline points="15 6 9 12 15 18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Voltar
        </div>
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <defs><radialGradient id="og3" cx="0.5" cy="0.5"><stop offset="0%" stop-color="#FFFFFF"/><stop offset="40%" stop-color="#F8D4D7"/><stop offset="100%" stop-color="#C97B8E"/></radialGradient></defs>
          <ellipse cx="100" cy="55" rx="22" ry="35" fill="url(#og3)"/>
          <ellipse cx="100" cy="55" rx="22" ry="35" fill="url(#og3)" transform="rotate(72 100 80)"/>
          <ellipse cx="100" cy="55" rx="22" ry="35" fill="url(#og3)" transform="rotate(144 100 80)"/>
          <ellipse cx="100" cy="55" rx="22" ry="35" fill="url(#og3)" transform="rotate(216 100 80)"/>
          <ellipse cx="100" cy="55" rx="22" ry="35" fill="url(#og3)" transform="rotate(288 100 80)"/>
          <circle cx="100" cy="80" r="10" fill="#C97B4F"/>
          <circle cx="100" cy="80" r="5" fill="#8B4A22"/>
        </svg>
      </div>

      <div class="notif">
        <div class="notif-icon">
          <svg viewBox="0 0 24 24"><path d="M6 8 A 6 6 0 0 1 18 8 V 14 L 20 17 H 4 L 6 14 Z" fill="currentColor"/><path d="M10 17 Q 10 20, 12 20 Q 14 20, 14 17" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
        </div>
        <div class="notif-text"><b>Lembrete em 1h</b> · Hora de regar a Orquídea Rosa.</div>
      </div>

      <div class="p-body">
        <div class="p-name">Orquídea Rosa</div>
        <div class="p-sci">Phalaenopsis sp.</div>

        <div class="water-card">
          <div class="water-row">
            <div class="water-icon-circle">
              <svg viewBox="0 0 24 24"><path d="M12 3 Q 6 11, 6 15 A 6 6 0 0 0 18 15 Q 18 11, 12 3 Z" fill="currentColor"/></svg>
            </div>
            <div>
              <div class="water-label">Próxima rega</div>
              <div class="water-value">Hoje, 8:00</div>
              <div class="water-sub">Última rega há 6 dias</div>
            </div>
          </div>
          <div class="water-progress"><div class="water-progress-fill"></div></div>
        </div>

        <div class="section-h">AÇÕES RÁPIDAS</div>
        <div class="actions">
          <div class="action-tile">
            <div class="action-tile-icon" style="background:#E3EFF5;color:#1F4530"><svg viewBox="0 0 24 24"><path d="M12 3 Q 6 11, 6 15 A 6 6 0 0 0 18 15 Q 18 11, 12 3 Z" fill="currentColor"/></svg></div>
            <div class="action-tile-label">Reguei agora</div>
          </div>
          <div class="action-tile">
            <div class="action-tile-icon" style="background:#E1EFE4"><svg viewBox="0 0 24 24"><path d="M4 18C 4 10, 12 4, 20 4 C 20 12, 14 20, 6 20 C 6 20, 5 19.5, 4 18 Z" stroke="currentColor" stroke-width="1.8" fill="none"/></svg></div>
            <div class="action-tile-label">Aduba­ção</div>
          </div>
          <div class="action-tile">
            <div class="action-tile-icon" style="background:#F5E1D4;color:#8B4A22"><svg viewBox="0 0 24 24"><circle cx="6" cy="6" r="3" fill="none" stroke="currentColor" stroke-width="1.8"/><circle cx="6" cy="18" r="3" fill="none" stroke="currentColor" stroke-width="1.8"/><line x1="9" y1="8" x2="20" y2="19" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="9" y1="16" x2="20" y2="5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></div>
            <div class="action-tile-label">Podei</div>
          </div>
          <div class="action-tile">
            <div class="action-tile-icon"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.8" fill="none"/><circle cx="8" cy="10" r="1.5" fill="currentColor"/></svg></div>
            <div class="action-tile-label">Foto</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="sub">Notificações automáticas no horário certo<br/>para cada planta do seu jardim.</div>

</body>
</html>
