<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<title>S1 — Identificar</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1920px; overflow:hidden;
  background: linear-gradient(160deg, #0B2216 0%, #0D2E1A 40%, #07180E 100%);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  position:relative;
}
.tag { position:absolute; top:80px; left:80px; display:inline-flex; align-items:center; gap:8px; background:rgba(138,210,138,0.15); border:1px solid rgba(138,210,138,0.3); color:#8AD28A; font-size:28px; font-weight:600; letter-spacing:2px; text-transform:uppercase; padding:12px 28px; border-radius:100px; }
h1 { position:absolute; top:160px; left:80px; right:80px; color:#fff; font-size:130px; font-weight:900; line-height:1.0; letter-spacing:-3px; }
h1 span { color:#6FCF7F; }
.sub { position:absolute; bottom:130px; left:80px; right:80px; color:rgba(255,255,255,0.6); font-size:46px; font-weight:400; line-height:1.5; }

.phone-wrap { position:absolute; left:50%; transform:translateX(-50%); top:530px; width:560px; filter:drop-shadow(0 60px 120px rgba(0,0,0,0.7)); }
.phone { width:560px; height:1120px; background:#0C0C0C; border-radius:80px; border:10px solid #2A2A2A; overflow:hidden; box-shadow:inset 0 0 0 2px #3A3A3A; position:relative; }
.phone::before { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:160px; height:36px; background:#0C0C0C; border-radius:0 0 24px 24px; z-index:10; }
.screen { width:100%; height:100%; background:#1A1A1A; border-radius:70px; overflow:hidden; display:flex; flex-direction:column; }

.status-bar { display:flex; justify-content:space-between; padding:24px 32px 0; color:#eee; font-size:20px; font-weight:600; flex-shrink:0; }
.cam { flex:1; background:linear-gradient(180deg,#2A3A2A,#1A2A1A); display:flex; align-items:center; justify-content:center; position:relative; }
.ring { position:absolute; width:380px; height:380px; border-radius:50%; border:3px solid rgba(111,207,127,0.6); }
.circle { width:340px; height:340px; border-radius:50%; background:radial-gradient(circle at 40% 40%,#4A7A3A,#2A4A1A); display:flex; align-items:center; justify-content:center; font-size:150px; box-shadow:0 0 0 4px rgba(111,207,127,0.3); }
.result { background:#FAF7F2; border-radius:40px 40px 0 0; padding:32px 30px 22px; flex-shrink:0; }
.badge { display:inline-flex; align-items:center; gap:6px; background:#E8F5EC; color:#2E7D4F; font-size:20px; font-weight:700; padding:7px 16px; border-radius:100px; margin-bottom:12px; }
.bdot { width:8px; height:8px; background:#2E7D4F; border-radius:50%; }
.pname { font-size:36px; font-weight:800; color:#1C2E24; margin-bottom:4px; }
.psci { font-size:22px; color:#6B8C76; font-style:italic; margin-bottom:16px; }
.tags { display:flex; gap:10px; flex-wrap:wrap; }
.pill { background:#F0F4F1; color:#4A7060; font-size:18px; font-weight:600; padding:7px 16px; border-radius:100px; }
</style>
</head>
<body>
<div class="tag">🌿 PlantaCerta</div>
<h1>Fotografe.<br/><span>Identifique.</span><br/>Aprenda.</h1>
<div class="phone-wrap"><div class="phone"><div class="screen">
  <div class="status-bar"><span>9:41</span><span>●●● ▌</span></div>
  <div class="cam">
    <div class="ring"></div>
    <div class="circle">🌿</div>
  </div>
  <div class="result">
    <div class="badge"><div class="bdot"></div>Alta confiança</div>
    <div class="pname">Costela de Adão</div>
    <div class="psci">Monstera deliciosa</div>
    <div class="tags">
      <div class="pill">🌤 Luz indireta</div>
      <div class="pill">💧 2x por semana</div>
      <div class="pill">Fácil</div>
    </div>
  </div>
</div></div></div>
<div class="sub">Use a câmera ou galeria —<br/>a IA identifica em segundos.</div>
</body>
</html>
